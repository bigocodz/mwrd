# Supabase local dev configuration
# Run `supabase start` to start the local stack
# Run `supabase db push` to apply migrations to your remote project
# Run `supabase gen types typescript --local > lib/supabase/types.ts` to regenerate types

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv4"
heartbeat_interval_ms = 30000
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
max_frequency = "1s"

[auth.email.smtp]
host = "inbucket"
port = 2500
user = ""
pass = ""
admin_email = "admin@mwrd.local"
sender_name = "MWRD Connect"

[auth.sms]
enable_signup = false

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# ============================================================
# Scheduled Edge Functions (replacing Convex cronJobs)
# These hit Edge Function endpoints on a schedule.
# On Supabase Free, use an external cron (cron-job.org) pointing
# to the function URLs, or upgrade to Pro for pg_cron.
# ============================================================

# [functions.scheduled-auto-quote]
# verify_jwt = true

# [functions.scheduled-invoices]
# verify_jwt = true

[analytics]
enabled = false
port = 54327
backend = "postgres"
